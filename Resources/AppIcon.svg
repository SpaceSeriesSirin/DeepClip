<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>DeepClip</title>
  <desc>Smart clipboard manager — a clipboard with a neural-network depth motif.</desc>

  <defs>
    <!-- Deep, rich background gradient: indigo plunging into violet/blue -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#4F7BFF"/>
      <stop offset="45%" stop-color="#5A4BE0"/>
      <stop offset="100%" stop-color="#2B1C73"/>
    </linearGradient>

    <!-- Radial glow to give a sense of "depth" / a portal in the center -->
    <radialGradient id="depthGlow" cx="50%" cy="42%" r="62%">
      <stop offset="0%"  stop-color="#7FA0FF" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#5A4BE0" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#2B1C73" stop-opacity="0.0"/>
    </radialGradient>

    <!-- Subtle gradient for the paper sheet -->
    <linearGradient id="paperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EAF0FF"/>
    </linearGradient>

    <!-- Cyan→violet accent for the neural lines -->
    <linearGradient id="neuralGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#43E7FF"/>
      <stop offset="100%" stop-color="#8A6BFF"/>
    </linearGradient>

    <!-- Soft drop shadow for the clipboard -->
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#0E0838" flood-opacity="0.40"/>
    </filter>

    <!-- Glow for the neural nodes -->
    <filter id="nodeGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="squircle">
      <rect x="62" y="62" width="900" height="900" rx="205" ry="205"/>
    </clipPath>
  </defs>

  <!-- App tile background (macOS squircle proportions) -->
  <rect x="62" y="62" width="900" height="900" rx="205" ry="205" fill="url(#bgGrad)"/>

  <!-- Depth elements clipped to the tile -->
  <g clip-path="url(#squircle)">
    <!-- Central depth glow -->
    <rect x="62" y="62" width="900" height="900" fill="url(#depthGlow)"/>

    <!-- "Deep" concentric depth rings receding into the background -->
    <g fill="none" stroke="#FFFFFF" stroke-linecap="round">
      <ellipse cx="512" cy="470" rx="350" ry="350" stroke-opacity="0.06" stroke-width="3"/>
      <ellipse cx="512" cy="470" rx="430" ry="430" stroke-opacity="0.05" stroke-width="3"/>
      <ellipse cx="512" cy="470" rx="270" ry="270" stroke-opacity="0.08" stroke-width="3"/>
    </g>

    <!-- Layered "depth" wave bands near the bottom (data flowing into the deep) -->
    <g fill="none" stroke-linecap="round" opacity="0.85">
      <path d="M 62 820 Q 280 760 512 820 T 962 820" stroke="#43E7FF" stroke-opacity="0.22" stroke-width="10"/>
      <path d="M 62 868 Q 280 808 512 868 T 962 868" stroke="#8A6BFF" stroke-opacity="0.22" stroke-width="10"/>
      <path d="M 62 916 Q 280 856 512 916 T 962 916" stroke="#43E7FF" stroke-opacity="0.14" stroke-width="10"/>
    </g>
  </g>

  <!-- ===== Clipboard ===== -->
  <g filter="url(#softShadow)">
    <!-- Board back -->
    <rect x="312" y="276" width="400" height="500" rx="46" ry="46" fill="#2C2350"/>
    <!-- Paper sheet -->
    <rect x="340" y="318" width="344" height="430" rx="30" ry="30" fill="url(#paperGrad)"/>
    <!-- Metal clip -->
    <rect x="452" y="252" width="120" height="78" rx="22" ry="22" fill="#C9D2F2"/>
    <rect x="476" y="236" width="72" height="60" rx="26" ry="26" fill="#2C2350"/>
    <rect x="486" y="246" width="52" height="44" rx="20" ry="20" fill="#9AA8E0"/>
  </g>

  <!-- ===== Neural network "depth/intelligence" graph drawn ON the paper ===== -->
  <g>
    <!-- Connections -->
    <g stroke="url(#neuralGrad)" stroke-width="6" stroke-linecap="round" opacity="0.9">
      <line x1="408" y1="408" x2="512" y2="486"/>
      <line x1="408" y1="560" x2="512" y2="486"/>
      <line x1="408" y1="408" x2="512" y2="600"/>
      <line x1="408" y1="560" x2="512" y2="600"/>
      <line x1="512" y1="486" x2="616" y2="430"/>
      <line x1="512" y1="486" x2="616" y2="560"/>
      <line x1="512" y1="600" x2="616" y2="560"/>
      <line x1="512" y1="600" x2="616" y2="430"/>
    </g>

    <!-- Nodes (glowing) -->
    <g filter="url(#nodeGlow)">
      <circle cx="408" cy="408" r="24" fill="#43E7FF"/>
      <circle cx="408" cy="560" r="24" fill="#5FA0FF"/>
      <circle cx="512" cy="486" r="30" fill="#8A6BFF"/>
      <circle cx="512" cy="600" r="22" fill="#6F7BFF"/>
      <circle cx="616" cy="430" r="22" fill="#43E7FF"/>
      <circle cx="616" cy="560" r="26" fill="#8A6BFF"/>
    </g>
  </g>
</svg>
